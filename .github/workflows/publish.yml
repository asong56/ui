name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Prepare NPM Payload
        run: |
          mkdir deploy_npm
          cp -r dist/ deploy_npm/
          cp -r src/ deploy_npm/
          cp package.json deploy_npm/

      - name: Sync to npm Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: npm
          folder: deploy_npm
          clean: false
          single-commit: false

      - name: Publish to npm
        run: |
          cd deploy_npm
          npm publish --access public --provenance