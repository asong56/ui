name: Publish → npm

on:
  push:
    tags: ['v*']

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - run: bun install
      - run: bun run build

      - name: Assemble npm payload
        run: |
          mkdir -p deploy_npm/static
          cp -r static/css deploy_npm/static/
          cp -r src         deploy_npm/
          cp package.json README.md LICENSE deploy_npm/

      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: npm
          folder: deploy_npm
          clean: false
          single-commit: false

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - run: cd deploy_npm && npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
